<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pre Survey</title>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #0D0D0F;
  color: white;
}

header {
  padding: 20px 40px;
}

header img {
  height: 50px;
}

.center {
  height: 80vh;
  display: flex;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.box {
  max-width: 500px;
}

h2 {
  color: #B92185;
  margin-bottom: 30px;
}

.button {
  padding: 14px 30px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  background: linear-gradient(135deg, #B92185, #8A3392);
  color: white;
  display: inline-block;
}
/* TOP BAR */
.top-bar {
  position: absolute;
  top: 20px;
  right: 40px;
}

.github-btn {
  padding: 10px 18px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  background: linear-gradient(135deg, #B92185, #8A3392);
  color: white;
  text-decoration: none;
  font-size: 14px;
}

.github-btn:hover {
  opacity: 0.9;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 30px 20px;
  font-size: 14px;
  color: #888;
}

.footer strong {
  color: #B92185;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" alt="Calma Logo" />
</header>

<div class="top-bar">
  <a href="https://github.com/NoLifeStudent/Calma-AI" target="_blank" class="github-btn">
    GitHub
  </a>
</div>

<div class="center">
  <div class="box">
    <h2>Sebelum lanjut, silakan mengisi survey singkat berikut.</h2>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdqpGtNHTvIgRQodgRZWz0tMVomSH1kpFwxVNwW-fpo1O3YuQ/viewform?usp=header" target="_blank" class="button">ISI →</a>
    <br><br>
    <a href="chat.html" style="color:#B92185;">Lanjut ke Chat</a>
  </div>
</div>
<div class="footer">
  <div>Made with passion</div>
  <div><strong>Mirza Hakim</strong></div>
  <div><strong>Hafid Alfianto</strong></div>
</div>
</body>
</html>
