<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calma AI - Chat</title>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #0f0f14;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  padding: 20px 40px;
}

.header img {
  height: 50px;
}

/* CHAT WRAPPER */
.chat-wrapper {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

/* CHAT CONTAINER (THE CARD) */
.chat-container {
  width: 900px;
  height: 550px;
  background: #18181f;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  box-shadow: 0 25px 80px rgba(0,0,0,0.6);
  overflow: hidden;
}

/* MESSAGES AREA */
.messages {
  flex: 1;
  padding: 25px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* MESSAGE BUBBLES */
.message {
  padding: 14px 18px;
  border-radius: 18px;
  max-width: 70%;
  font-size: 14px;
  line-height: 1.5;
}

.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #B92185, #8A3392);
  color: white;
}

.bot {
  align-self: flex-start;
  background: #2a2a35;
  color: white;
}

/* INPUT AREA */
.input-area {
  display: flex;
  padding: 18px;
  gap: 12px;
  border-top: 1px solid #2f2f3a;
}

input {
  flex: 1;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: #2a2a35;
  color: white;
  font-size: 14px;
  outline: none;
}

button {
  padding: 14px 22px;
  border-radius: 14px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  background: linear-gradient(135deg, #B92185, #8A3392);
  color: white;
}

button:hover {
  opacity: 0.9;
}

/* POST SURVEY BUTTON */
.post-btn {
  position: fixed;
  bottom: 30px;
  right: 40px;
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" alt="Calma Logo">
</div>

<div class="chat-wrapper">
  <div class="chat-container">
    <div class="messages" id="messages"></div>

    <div class="input-area">
      <input type="text" id="userInput" placeholder="Tulis pesan..." />
      <button onclick="sendMessage()">Kirim</button>
    </div>
  </div>
</div>

<button class="post-btn" onclick="openPostSurvey()">Isi Post-Survey</button>

<script>
const messages = document.getElementById("messages");
const input = document.getElementById("userInput");

function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerText = text;
  messages.appendChild(msg);
  messages.scrollTop = messages.scrollHeight;
}

async function sendMessage() {
  const userText = input.value.trim();
  if (!userText) return;

  addMessage(userText, "user");
  input.value = "";

  const typing = document.createElement("div");
  typing.classList.add("message", "bot");
  typing.innerText = "Mengetik...";
  messages.appendChild(typing);
  messages.scrollTop = messages.scrollHeight;

  try {
    const response = await fetch("/api/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message: userText })
    });

    const data = await response.json();

    messages.removeChild(typing);
    addMessage(data.reply || "Tidak ada respon.", "bot");

  } catch (error) {
    messages.removeChild(typing);
    addMessage("Terjadi kesalahan koneksi.", "bot");
  }
}

input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});

function openPostSurvey() {
  window.open("https://yohttps://docs.google.com/forms/d/e/1FAIpQLSd77bhuG1NcYD9g1SvjJm9LLT9SIyTinY-gcenxl4OLtS1yWg/viewform?usp=publish-editorur-post-survey-link.com", "_blank");
}
</script>

</body>
</html>
