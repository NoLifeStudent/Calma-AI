<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calma - Landing</title>

<style>
body {
  margin: 0;
  font-family: Inter, sans-serif;
  background: #0D0D0F;
  color: #FFFFFF;
}

header {
  padding: 20px 40px;
}

header img {
  height: 50px;
}

.center {
  height: 80vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}

h1 {
  color: #B92185;
  font-size: 48px;
  margin: 10px 0;
}

h2 {
  font-size: 28px;
  margin: 10px 0;
}

p {
  opacity: 0.8;
  margin-bottom: 40px;
}

.button {
  padding: 14px 30px;
  border-radius: 30px;
  text-decoration: none;
  font-weight: bold;
  background: linear-gradient(135deg, #B92185, #8A3392);
  color: white;
  transition: 0.3s;
}

.button:hover {
  opacity: 0.85;
}
/* TOP BAR */
.top-bar {
  position: absolute;
  top: 20px;
  right: 40px;
}

.github-btn {
  padding: 10px 18px;
  border-radius: 12px;
  border: none;
  cursor: pointer;
  font-weight: 600;
  background: linear-gradient(135deg, #B92185, #8A3392);
  color: white;
  text-decoration: none;
  font-size: 14px;
}

.github-btn:hover {
  opacity: 0.9;
}

/* FOOTER */
.footer {
  text-align: center;
  padding: 30px 20px;
  font-size: 14px;
  color: #888;
}

.footer strong {
  color: #B92185;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" alt="Calma Logo" />
</header>
<div class="top-bar">
  <a href="https://github.com/NoLifeStudent/Calma-AI" target="_blank" class="github-btn">
    GitHub
  </a>
</div>

<div class="center">
  <h1>SELAMAT DATANG</h1>
  <h2>WEBSITE KONSELING</h2>
  <p>Chatbot AI untuk konseling mandiri</p>
  <a href="pre-survey.html" class="button">MULAI SESI</a>
</div>

<div class="footer">
  <div>Made with passion</div>
  <div><strong>Mirza Hakim</strong></div>
  <div><strong>Hafid Alfianto</strong></div>
</div>
</body>
</html>
